<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진로 탐구 통합 아카이브</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7f6;
            --point: #2c3e50;
            --accent: #3498db;
            --card: #ffffff;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            line-height: 1.6;
        }

        header {
            background: var(--point);
            color: white;
            padding: 3rem 1rem;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: -30px auto 50px;
            padding: 0 20px;
        }

        /* 참고 사이트 섹션 */
        .search-portal {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        .portal-title {
            font-weight: bold;
            color: #e74c3c;
            display: block;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .academic-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .academic-links a {
            display: block;
            padding: 12px;
            background: #f8f9fa;
            text-align: center;
            border-radius: 8px;
            color: #444;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid #eee;
            transition: 0.3s;
        }

        .academic-links a:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* 필터 및 검색 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }

        #searchInput {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid #ddd;
            outline: none;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 6px 15px;
            border-radius: 15px;
            border: 1px solid var(--point);
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .filter-btn.active {
            background: var(--point);
            color: white;
        }

        /* 도서 카드 그리드 */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .book-card {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-top: 5px solid #ccc;
        }

        .book-card[data-cat="인문/사회"] { border-top-color: #e67e22; }
        .book-card[data-cat="경제"] { border-top-color: #f1c40f; }
        .book-card[data-cat="공학"] { border-top-color: #2ecc71; }
        .book-card[data-cat="의학"] { border-top-color: #9b59b6; }

        .cat-tag { font-size: 0.7rem; font-weight: bold; color: #999; margin-bottom: 5px; display: block; }
        .book-title { font-family: 'Noto Serif KR', serif; font-size: 1.2rem; margin: 5px 0 10px; }
        .book-reason { font-size: 0.9rem; color: #555; line-height: 1.5; }

        footer { text-align: center; color: #888; padding: 40px 0; }
    </style>
</head>
<body>

<header>
    <h1>🚀 진로 탐구 리소스 포털</h1>
    <p>도서 아카이브와 학술 자료 검색을 한눈에</p>
</header>

<div class="container">
    <section class="search-portal">
        <span class="portal-title">🔍 학술 논문 및 전문 자료 찾기</span>
        <div class="academic-links">
            <a href="https://www.riss.kr" target="_blank">RISS (학술연구정보)</a>
            <a href="https://dbpia.co.kr" target="_blank">DBpia (누리미디어)</a>
            <a href="https://scholar.google.co.kr" target="_blank">Google Scholar</a>
            <a href="https://scienceon.kisti.re.kr" target="_blank">ScienceON</a>
        </div>
    </section>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="도서명 또는 키워드 검색..." onkeyup="filterBooks()">
        <div class="filter-group">
            <button class="filter-btn active" onclick="setCategory('전체')">전체</button>
            <button class="filter-btn" onclick="setCategory('인문/사회')">인문/사회</button>
            <button class="filter-btn" onclick="setCategory('경제')">경제</button>
            <button class="filter-btn" onclick="setCategory('공학')">공학</button>
            <button class="filter-btn" onclick="setCategory('의학')">의학</button>
        </div>
    </div>

    <div class="book-grid" id="bookGrid"></div>
</div>

<footer>
    © 2026 진로 탐구 시스템 | 데이터 기반 학술 아카이브
</footer>

<script>
    const books = [
        { cat: "인문/사회", title: "세계를 바꾼 미디어", author: "김경화", reason: "미디어가 인간의 삶과 소통 방식에 미친 영향을 분석하며 역사적 발전을 다룹니다." },
        { cat: "인문/사회", title: "소유냐 존재냐", author: "에리히 프롬", reason: "현대인의 '소유'와 '존재' 딜레마를 탐구하며 자기 성찰을 돕는 고전입니다." },
        { cat: "인문/사회", title: "펭귄과 리바이어던", author: "요차이 벤클러", reason: "인간의 협력적 본성을 증명하며 사회 혁신 시스템을 제안하는 통찰을 담았습니다." },
        { cat: "경제", title: "삼국지 경영학", author: "최우석", reason: "조조, 유비, 손권의 리더십을 현대 경영의 관점에서 재해석한 지침서입니다." },
        { cat: "공학", title: "딥러닝 레볼루션", author: "테런스 J. 세즈노스키", reason: "AI 패러다임이 산업과 교육 전 영역을 어떻게 변화시키는지 분석합니다." },
        { cat: "공학", title: "공학이란 무엇인가", author: "성풍현", reason: "다양한 공학 분야의 본질과 미래 공학도의 비전을 제시합니다." },
        { cat: "공학", title: "기술 중독 사회", author: "저자 미상", reason: "기술의 무리한 도입 대신 인간 중심의 교육과 내면적 성장을 강조합니다." },
        { cat: "의학", title: "골든아워 1,2", author: "이국종", reason: "중증외상센터의 기록을 통해 한국 의료 현실과 생명의 가치를 전합니다." },
        { cat: "의학", title: "위대하고 위험한 약 이야기", author: "정진호", reason: "약의 역사를 통해 인류의 질병 극복 열망과 과학적 선택의 중요성을 다룹니다." }
    ];

    let currentCat = '전체';

    function render() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const grid = document.getElementById('bookGrid');
        
        const filtered = books.filter(b => {
            const matchesSearch = b.title.toLowerCase().includes(query) || b.reason.toLowerCase().includes(query);
            const matchesCat = (currentCat === '전체' || b.cat === currentCat);
            return matchesSearch && matchesCat;
        });

        grid.innerHTML = filtered.map(b => `
            <div class="book-card" data-cat="${b.cat}">
                <span class="cat-tag">${b.cat}</span>
                <h3 class="book-title">${b.title}</h3>
                <p class="book-reason">${b.reason}</p>
            </div>
        `).join('');
    }

    function setCategory(cat) {
        currentCat = cat;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === cat);
        });
        render();
    }

    function filterBooks() { render(); }

    render(); // 초기 실행
</script>

</body>
</html>
